<svg viewBox="0 0 900 340" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#374151"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="32" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">
    The Tokenization Pipeline — How Text Becomes Numbers
  </text>
  <text x="450" y="56" text-anchor="middle" font-size="13" fill="#6b7280">
    Each stage is just a deterministic transformation. No magic, just lookups and rules.
  </text>

  <!-- ====== Stage 1: Raw Text ====== -->
  <rect x="30" y="100" width="180" height="120" rx="10" fill="#eff6ff" stroke="#1d4ed8" stroke-width="2"/>
  <text x="120" y="124" text-anchor="middle" font-size="13" font-weight="700" fill="#1d4ed8">1. Raw Text</text>
  <text x="120" y="160" text-anchor="middle" font-size="16" font-family="ui-monospace, monospace" fill="#111827">"Hello, world!"</text>
  <text x="120" y="195" text-anchor="middle" font-size="11" fill="#6b7280">A Unicode string</text>
  <text x="120" y="210" text-anchor="middle" font-size="11" fill="#6b7280">(what the user typed)</text>

  <!-- Arrow -->
  <line x1="220" y1="160" x2="250" y2="160" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ====== Stage 2: Pre-tokenize ====== -->
  <rect x="260" y="100" width="180" height="120" rx="10" fill="#f0fdf4" stroke="#15803d" stroke-width="2"/>
  <text x="350" y="124" text-anchor="middle" font-size="13" font-weight="700" fill="#15803d">2. Pre-tokenize</text>
  <text x="350" y="155" text-anchor="middle" font-size="13" font-family="ui-monospace, monospace" fill="#111827">["Hello", ",", " world", "!"]</text>
  <text x="350" y="190" text-anchor="middle" font-size="11" fill="#6b7280">Split on whitespace,</text>
  <text x="350" y="205" text-anchor="middle" font-size="11" fill="#6b7280">keep punctuation separate</text>

  <!-- Arrow -->
  <line x1="450" y1="160" x2="480" y2="160" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ====== Stage 3: Apply Merges (BPE) ====== -->
  <rect x="490" y="100" width="180" height="120" rx="10" fill="#fef3c7" stroke="#b45309" stroke-width="2"/>
  <text x="580" y="124" text-anchor="middle" font-size="13" font-weight="700" fill="#b45309">3. Apply BPE Merges</text>
  <text x="580" y="155" text-anchor="middle" font-size="13" font-family="ui-monospace, monospace" fill="#111827">["Hello", ",", " world", "!"]</text>
  <text x="580" y="190" text-anchor="middle" font-size="11" fill="#6b7280">Look up sub-pieces in</text>
  <text x="580" y="205" text-anchor="middle" font-size="11" fill="#6b7280">the learned vocabulary</text>

  <!-- Arrow -->
  <line x1="680" y1="160" x2="710" y2="160" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ====== Stage 4: Token IDs ====== -->
  <rect x="720" y="100" width="160" height="120" rx="10" fill="#fef2f2" stroke="#b91c1c" stroke-width="2"/>
  <text x="800" y="124" text-anchor="middle" font-size="13" font-weight="700" fill="#b91c1c">4. Token IDs</text>
  <text x="800" y="160" text-anchor="middle" font-size="16" font-family="ui-monospace, monospace" fill="#111827">[15496, 11, 995, 0]</text>
  <text x="800" y="195" text-anchor="middle" font-size="11" fill="#6b7280">The integers the model</text>
  <text x="800" y="210" text-anchor="middle" font-size="11" fill="#6b7280">actually sees</text>

  <!-- ====== Caption below ====== -->
  <text x="450" y="270" text-anchor="middle" font-size="13" fill="#374151" font-weight="600">
    From here, each integer ID is looked up in the embedding table (Module 2)
  </text>
  <text x="450" y="290" text-anchor="middle" font-size="13" fill="#374151">
    to become a vector — and from there it flows through the transformer.
  </text>
  <text x="450" y="318" text-anchor="middle" font-size="11" fill="#6b7280" font-style="italic">
    Steps 2 and 3 differ per tokenizer family — character, word, and BPE differ mostly in step 3.
  </text>
</svg>
