<svg viewBox="0 0 900 560" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <defs>
    <marker id="arr2" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#7c3aed"/>
    </marker>
    <marker id="arrgray" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#9ca3af"/>
    </marker>
  </defs>

  <text x="450" y="32" text-anchor="middle" font-size="20" font-weight="700" fill="#111827">
    The Geometry of a Learned Embedding Space
  </text>
  <text x="450" y="54" text-anchor="middle" font-size="13" fill="#6b7280">
    A 2-D projection of what training does to the embedding matrix.
  </text>
  <text x="450" y="73" text-anchor="middle" font-size="12" fill="#6b7280" font-style="italic">
    Similar meanings end up near each other. Differences become directions.
  </text>

  <!-- Plot frame -->
  <rect x="60" y="100" width="780" height="380" rx="8" fill="#fafafa" stroke="#d1d5db"/>
  <line x1="60" y1="290" x2="840" y2="290" stroke="#e5e7eb"/>
  <line x1="450" y1="100" x2="450" y2="480" stroke="#e5e7eb"/>

  <!-- Cluster 1: Animals (top-left) -->
  <ellipse cx="200" cy="190" rx="120" ry="65" fill="#dbeafe" fill-opacity="0.5" stroke="#1d4ed8" stroke-dasharray="4,3"/>
  <text x="200" y="135" text-anchor="middle" font-size="13" font-weight="700" fill="#1d4ed8">Animals</text>

  <circle cx="170" cy="170" r="5" fill="#1d4ed8"/>
  <text x="180" y="167" font-size="12" fill="#111827">cat</text>
  <circle cx="220" cy="185" r="5" fill="#1d4ed8"/>
  <text x="230" y="182" font-size="12" fill="#111827">dog</text>
  <circle cx="155" cy="210" r="5" fill="#1d4ed8"/>
  <text x="125" y="215" font-size="12" fill="#111827">kitten</text>
  <circle cx="245" cy="220" r="5" fill="#1d4ed8"/>
  <text x="255" y="224" font-size="12" fill="#111827">puppy</text>

  <!-- Cluster 2: Vehicles (top-right) -->
  <ellipse cx="700" cy="190" rx="110" ry="65" fill="#fef3c7" fill-opacity="0.5" stroke="#b45309" stroke-dasharray="4,3"/>
  <text x="700" y="135" text-anchor="middle" font-size="13" font-weight="700" fill="#b45309">Vehicles</text>

  <circle cx="670" cy="180" r="5" fill="#b45309"/>
  <text x="680" y="177" font-size="12" fill="#111827">car</text>
  <circle cx="720" cy="200" r="5" fill="#b45309"/>
  <text x="730" y="197" font-size="12" fill="#111827">truck</text>
  <circle cx="660" cy="220" r="5" fill="#b45309"/>
  <text x="610" y="225" font-size="12" fill="#111827">bus</text>
  <circle cx="730" cy="220" r="5" fill="#b45309"/>
  <text x="740" y="224" font-size="12" fill="#111827">van</text>

  <!-- Cluster 3: Royalty/people (bottom-center) — used for analogy -->
  <ellipse cx="450" cy="395" rx="220" ry="65" fill="#ede9fe" fill-opacity="0.5" stroke="#7c3aed" stroke-dasharray="4,3"/>
  <text x="450" y="345" text-anchor="middle" font-size="13" font-weight="700" fill="#7c3aed">People &amp; Royalty</text>

  <!-- The four analogy points -->
  <circle cx="340" cy="380" r="6" fill="#7c3aed"/>
  <text x="305" y="384" font-size="12" fill="#111827" font-weight="600">man</text>

  <circle cx="560" cy="380" r="6" fill="#7c3aed"/>
  <text x="570" y="384" font-size="12" fill="#111827" font-weight="600">woman</text>

  <circle cx="340" cy="430" r="6" fill="#7c3aed"/>
  <text x="300" y="434" font-size="12" fill="#111827" font-weight="600">king</text>

  <circle cx="560" cy="430" r="6" fill="#7c3aed"/>
  <text x="570" y="434" font-size="12" fill="#111827" font-weight="600">queen</text>

  <!-- Analogy arrows: man → woman and king → queen are PARALLEL -->
  <line x1="346" y1="380" x2="554" y2="380" stroke="#7c3aed" stroke-width="2.5" stroke-dasharray="6,4" marker-end="url(#arr2)"/>
  <line x1="346" y1="430" x2="554" y2="430" stroke="#7c3aed" stroke-width="2.5" stroke-dasharray="6,4" marker-end="url(#arr2)"/>

  <text x="450" y="372" text-anchor="middle" font-size="11" fill="#7c3aed" font-weight="600">"male → female" direction</text>
  <text x="450" y="450" text-anchor="middle" font-size="11" fill="#7c3aed" font-weight="600">same direction (parallel)</text>

  <!-- "Royal" direction: man→king, woman→queen -->
  <line x1="340" y1="386" x2="340" y2="424" stroke="#9ca3af" stroke-width="1.5" stroke-dasharray="3,3" marker-end="url(#arrgray)"/>
  <line x1="560" y1="386" x2="560" y2="424" stroke="#9ca3af" stroke-width="1.5" stroke-dasharray="3,3" marker-end="url(#arrgray)"/>
  <text x="265" y="408" font-size="10" fill="#6b7280">"royal" axis</text>

  <!-- Key insight box -->
  <rect x="80" y="495" width="740" height="55" rx="6" fill="#ffffff" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="450" y="515" text-anchor="middle" font-size="12" fill="#374151" font-weight="600">
    The reason word arithmetic works:
  </text>
  <text x="450" y="535" text-anchor="middle" font-size="12" fill="#374151" font-family="ui-monospace, monospace">
    vector(king) − vector(man) + vector(woman) ≈ vector(queen)
  </text>
</svg>
